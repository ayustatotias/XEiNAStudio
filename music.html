<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listen — Tatsuya Saito</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #0d0d0d;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      min-height: 100vh;
      color: #ffffff;
    }

    /* ── Back link ── */
    .back {
      position: fixed;
      top: 2rem;
      left: 2rem;
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: #ffffff;
      opacity: 0.35;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .back:hover { opacity: 0.9; }
    .back::before { content: '← '; }

    /* ── Center layout ── */
    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 5rem 1.5rem 4rem;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── Header ── */
    .artist {
      font-size: clamp(1.1rem, 3.5vw, 1.5rem);
      font-weight: 200;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.9;
      text-align: center;
    }
    .section-label {
      margin-top: 0.6rem;
      font-size: 0.65rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      opacity: 0.3;
      text-align: center;
    }
    .divider {
      margin: 2.5rem 0;
      width: 40px;
      height: 1px;
      background: #ffffff;
      opacity: 0.2;
    }

    /* ── Service cards ── */
    .services {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      width: 100%;
    }

    .service-link {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.95rem 1.4rem;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      text-decoration: none;
      color: #ffffff;
      background: rgba(255,255,255,0.03);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .service-link:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.25);
      transform: translateY(-2px);
    }
    .service-link svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      fill: currentColor;
    }
    .service-name {
      font-size: 0.82rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.8;
    }
    .service-link .arrow {
      margin-left: auto;
      font-size: 0.7rem;
      opacity: 0.3;
    }

    /* ── Footer ── */
    .page-footer {
      margin-top: 3.5rem;
      font-size: 0.58rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      opacity: 0.2;
      text-align: center;
    }

    /* ── Fade in ── */
    .wrapper { animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <a href="index.html" class="back">Home</a>

  <div class="wrapper">
    <p class="artist">Tatsuya Saito</p>
    <p class="section-label">Listen on</p>
    <div class="divider"></div>
